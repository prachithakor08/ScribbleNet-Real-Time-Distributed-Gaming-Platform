<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scribbly! — Multiplayer Drawing Game</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#1a1a2e;
  --surface:#16213e;
  --surface2:#0f3460;
  --accent:#e94560;
  --accent2:#f5a623;
  --green:#4ade80;
  --blue:#60a5fa;
  --text:#f0f4ff;
  --text2:#a8b2d8;
  --border:rgba(255,255,255,0.1);
  --r:12px;
}

html,body{height:100%;overflow:auto;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}

/* ── SCREENS ─────────────────────────────────── */
.screen{display:none;height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;
  background:radial-gradient(ellipse at 30% 20%,#1a3a5c 0%,#1a1a2e 60%);}
.screen.active{display:flex;}

/* ── LOGO ───────────────────────────────────── */
.logo{font-family:'Fredoka One',cursive;font-size:3.2rem;
  background:linear-gradient(135deg,#e94560,#f5a623,#4ade80,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(233,69,96,0.35));letter-spacing:2px;}
.logo-sub{font-size:.85rem;color:var(--text2);margin-top:-.5rem;letter-spacing:4px;text-transform:uppercase;text-align:center;}

/* ── CARD ───────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:1.75rem;width:100%;max-width:440px;display:flex;flex-direction:column;gap:1rem;}
.card-title{font-size:1.1rem;color:var(--text2);font-weight:700;}

/* ── INPUTS ─────────────────────────────────── */
.field{display:flex;flex-direction:column;gap:.4rem;}
.field label{font-size:.75rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.field input,.field select{
  background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;
  padding:.7rem 1rem;color:var(--text);font-family:'Nunito',sans-serif;font-size:.95rem;outline:none;
  transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field select option{background:#1a1a2e;}
.field input::placeholder{color:var(--text2);}

/* ── BUTTONS ─────────────────────────────────── */
.btn{border:none;border-radius:12px;padding:.85rem 1.5rem;
  font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .15s;text-transform:uppercase;letter-spacing:.5px;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c23152);color:#fff;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(233,69,96,.4);}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:rgba(255,255,255,.12);}
.btn-green{background:linear-gradient(135deg,var(--green),#22a360);color:#000;}
.btn-green:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(74,222,128,.35);}
.btn-row{display:flex;gap:.75rem;}
.btn-row .btn{flex:1;}

/* ── AVATAR PICKER ──────────────────────────── */
.avatar-row{display:flex;gap:.5rem;flex-wrap:wrap;}
.avi-btn{width:42px;height:42px;border-radius:50%;border:2px solid transparent;cursor:pointer;
  font-size:1.3rem;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);transition:border-color .15s,transform .15s;}
.avi-btn:hover{transform:scale(1.15);}
.avi-btn.sel{border-color:var(--accent);transform:scale(1.12);}

/* ── ERROR MSG ──────────────────────────────── */
.err-msg{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.4);
  border-radius:8px;padding:.6rem 1rem;font-size:.85rem;color:#f87171;display:none;}

/* ── LOBBY ROOM ─────────────────────────────── */
.room-code-display{
  background:rgba(245,166,35,.1);border:2px dashed rgba(245,166,35,.4);
  border-radius:16px;padding:1.25rem;text-align:center;}
.room-code-label{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:.4rem;}
.room-code-value{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--accent2);letter-spacing:8px;}
.room-code-hint{font-size:.75rem;color:var(--text2);margin-top:.4rem;}

.player-list-lobby{display:flex;flex-direction:column;gap:.5rem;max-height:200px;overflow-y:auto;}
.lobby-player{display:flex;align-items:center;gap:.75rem;
  background:rgba(255,255,255,.04);border-radius:10px;padding:.6rem .75rem;}
.lobby-player-name{font-weight:700;font-size:.9rem;}
.host-badge{font-size:.65rem;background:var(--accent);color:#fff;padding:2px 6px;border-radius:6px;margin-left:.4rem;font-weight:800;}
.waiting-msg{font-size:.85rem;color:var(--text2);text-align:center;font-style:italic;}

/* ── SETTINGS PANEL ─────────────────────────── */
.settings-row{display:flex;gap:.75rem;}
.settings-row .field{flex:1;}

/* ── GAME SCREEN ─────────────────────────────── */
#game-screen{display:none;height:100vh;flex-direction:column;overflow:hidden;}
#game-screen.active{display:flex;}

.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:.5rem 1rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0;}
.topbar-logo{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--accent);}
.round-label{font-size:.8rem;color:var(--text2);white-space:nowrap;}
.word-bar{flex:1;text-align:center;}
#word-display{font-family:'Fredoka One',cursive;font-size:1.6rem;letter-spacing:6px;color:var(--text);}
.timer-circle{
  width:44px;height:44px;border-radius:50%;border:3px solid var(--accent2);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1rem;color:var(--accent2);flex-shrink:0;
  transition:border-color .3s,color .3s;}
.timer-circle.urgent{border-color:var(--accent);color:var(--accent);animation:pulse .5s infinite alternate;}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}

.main{display:flex;flex:1;overflow:hidden;}

/* ── PLAYERS SIDEBAR ─────────────────────────── */
.sidebar{width:154px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:.6rem;gap:.4rem;overflow-y:auto;flex-shrink:0;}
.sidebar-title{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:.2rem 0;}
.p-card{
  background:rgba(255,255,255,.04);border-radius:10px;padding:.5rem .6rem;
  display:flex;align-items:center;gap:.5rem;border:1px solid transparent;
  transition:border-color .2s;position:relative;flex-shrink:0;}
.p-card.is-drawer{border-color:var(--accent2);}
.p-card.guessed{border-color:var(--green);}
.p-avi{font-size:1.3rem;flex-shrink:0;}
.p-info{flex:1;min-width:0;}
.p-name{font-size:.75rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-score{font-size:.7rem;color:var(--accent2);font-weight:700;}
.badge{position:absolute;top:-6px;right:-5px;font-size:.55rem;font-weight:800;
  padding:2px 5px;border-radius:5px;text-transform:uppercase;}
.badge-draw{background:var(--accent2);color:#000;}
.badge-ok{background:var(--green);color:#000;}

/* ── CANVAS AREA ─────────────────────────────── */
.canvas-wrap{flex:1;display:flex;flex-direction:column;background:#f0f4ff;overflow:hidden;}

.toolbar{
  background:#fff;border-bottom:1px solid #dde;padding:.45rem .75rem;
  display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;flex-shrink:0;}
.tsep{width:1px;height:26px;background:#dde;flex-shrink:0;}
.color-sw{width:24px;height:24px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;}
.color-sw:hover{transform:scale(1.2);}
.color-sw.act{border-color:#222;transform:scale(1.15);}
.sz-btn{border-radius:50%;background:#333;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;}
.sz-btn:hover{transform:scale(1.15);}
.sz-btn.act{border-color:var(--accent);}
.t-btn{padding:.28rem .65rem;border-radius:7px;border:1px solid #dde;background:#fff;
  font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;color:#333;transition:all .15s;white-space:nowrap;}
.t-btn:hover{background:#f0f4ff;}
.t-btn.act{background:var(--accent);color:#fff;border-color:var(--accent);}
.t-btn.clr{color:var(--accent);border-color:var(--accent);}
.t-btn.clr:hover{background:var(--accent);color:#fff;}

.info-strip{background:rgba(0,0,0,.06);padding:.35rem .75rem;
  display:flex;align-items:center;gap:.75rem;border-bottom:1px solid rgba(0,0,0,.08);flex-shrink:0;}
.info-label{font-size:.75rem;color:#555;flex:1;}
.reveal-track{height:4px;background:#dde;border-radius:2px;flex:1;max-width:160px;}
.reveal-fill{height:100%;width:0%;background:var(--accent2);border-radius:2px;transition:width 1s linear;}

.hint-bar{background:rgba(245,166,35,.12);border-bottom:1px solid rgba(245,166,35,.25);
  padding:.4rem .75rem;font-size:.8rem;color:#b45309;display:none;flex-shrink:0;}

#canvas{
  flex:1;
  cursor:crosshair;
  display:block;
  touch-action:none;
  z-index:1;
}
.chat{
  z-index:2;
}
#canvas.eraser{cursor:cell;}
#canvas.fill-c{cursor:copy;}
#canvas.viewer{cursor:default;}

/* ── CHAT ───────────────────────────────────── */
.chat{width:196px;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;}
.chat-head{padding:.65rem .75rem;font-size:.7rem;color:var(--text2);
  text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid var(--border);}
.chat-msgs{flex:1;overflow-y:auto;padding:.5rem;display:flex;flex-direction:column;gap:.35rem;}
.msg{font-size:.78rem;line-height:1.4;word-break:break-word;}
.msg.system{color:var(--text2);font-style:italic;}
.msg.correct{color:var(--green);font-weight:700;}
.msg.hint{color:var(--accent2);font-weight:600;}
.msg.guess .mn{font-weight:700;}
.msg.chat .mn{font-weight:700;color:var(--blue);}
.chat-input{padding:.5rem;border-top:1px solid var(--border);display:flex;gap:.4rem;position: relative;z-index: 10;}
.chat-input input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:7px;padding:.45rem .55rem;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:.78rem;outline:none;}
.chat-input input:focus{border-color:var(--accent);}
.chat-send{background:var(--accent);border:none;border-radius:7px;
  padding:.4rem .55rem;color:#fff;font-weight:800;cursor:pointer;font-size:.85rem;}
.chat-send:hover{opacity:.85;}

/* ── OVERLAY ─────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);}
.overlay.show{display:flex;}
.ov-card{background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:2rem;text-align:center;max-width:440px;width:90%;}
.ov-card h2{font-size:1.6rem;font-weight:800;margin-bottom:.4rem;}
.ov-card p{color:var(--text2);margin-bottom:1.25rem;font-size:.95rem;}
.word-choices{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;}
.wc{background:rgba(255,255,255,.06);border:2px solid var(--border);border-radius:12px;
  padding:.65rem 1.1rem;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
.wc:hover{border-color:var(--accent2);background:rgba(245,166,35,.15);color:var(--accent2);transform:translateY(-2px);}
.lb{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.25rem;text-align:left;}
.lb-row{display:flex;align-items:center;gap:.75rem;
  background:rgba(255,255,255,.04);border-radius:10px;padding:.65rem .9rem;}
.lb-rank{font-family:'Fredoka One',cursive;font-size:1.1rem;min-width:28px;}
.lb-avi{font-size:1.4rem;}
.lb-name{flex:1;font-weight:700;}
.lb-pts{font-weight:800;color:var(--accent2);font-size:1rem;}
.spin{display:inline-block;animation:spin 1s linear infinite;font-size:2rem;margin-bottom:.75rem;}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
</style>
</head>
<body>

<!-- ── SCREEN: HOME ─────────────────────────── -->
<div class="screen active" id="home-screen">
  <div style="margin-bottom:1.5rem;text-align:center;">
    <div class="logo">Scribbly!</div>
    <div class="logo-sub">Real-Time Multiplayer · Distributed Systems</div>
  </div>
  <div class="card">
    <div class="card-title">Join or Create a Game</div>
    <div class="field">
      <label>Your Name</label>
      <input id="h-name" type="text" placeholder="Enter your name..." maxlength="16" />
    </div>
    <div class="field">
      <label>Pick an Avatar</label>
      <div class="avatar-row" id="avi-row"></div>
    </div>
    <div id="h-err" class="err-msg"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-create">Create Room</button>
      <button class="btn btn-secondary" id="btn-show-join">Join Room</button>
    </div>
    <div id="join-section" style="display:none;flex-direction:column;gap:.75rem;">
      <div class="field">
        <label>Room Code</label>
        <input id="h-code" type="text" placeholder="e.g. A3FX" maxlength="4" style="text-transform:uppercase;letter-spacing:4px;font-size:1.3rem;font-weight:800;text-align:center;" />
      </div>
      <button class="btn btn-green" id="btn-join">Join Game →</button>
    </div>
  </div>
</div>

<!-- ── SCREEN: LOBBY ────────────────────────── -->
<div class="screen" id="lobby-screen">
  <div style="margin-bottom:1.25rem;text-align:center;">
    <div class="logo" style="font-size:2.4rem;">Scribbly!</div>
  </div>
  <div class="card">
    <div class="room-code-display">
      <div class="room-code-label">Room Code — share with friends</div>
      <div class="room-code-value" id="lobby-code">----</div>
      <div class="room-code-hint">📱 Open <strong id="lobby-url"></strong> on any device</div>
    </div>

    <div class="field">
      <label>Players (<span id="player-count">1</span>/8)</label>
      <div class="player-list-lobby" id="lobby-players"></div>
    </div>

    <div id="host-settings" style="display:none;flex-direction:column;gap:.75rem;">
      <div class="settings-row">
        <div class="field">
          <label>Rounds</label>
          <select id="s-rounds">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div class="field">
          <label>Draw Time</label>
          <select id="s-time">
            <option value="60">60s</option>
            <option value="80" selected>80s</option>
            <option value="100">100s</option>
            <option value="120">120s</option>
          </select>
        </div>
      </div>
    </div>

    <div id="lobby-status" class="waiting-msg">Waiting for players...</div>
    <div id="lobby-actions"></div>
  </div>
</div>

<!-- ── SCREEN: GAME ──────────────────────────── -->
<div id="game-screen">
  <div class="topbar">
    <div class="topbar-logo">Scribbly!</div>
    <div class="round-label" id="round-label">Round 1/3</div>
    <div class="word-bar"><div id="word-display">· · ·</div></div>
    <div class="timer-circle" id="timer">80</div>
  </div>

  <div class="main">
    <!-- Players -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-title">Players</div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrap">
      <div class="toolbar" id="toolbar">
        <div id="color-row" style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;"></div>
        <div class="tsep"></div>
        <div style="display:flex;gap:.4rem;align-items:center;">
          <div class="sz-btn act" data-sz="4" style="width:10px;height:10px;"></div>
          <div class="sz-btn" data-sz="10" style="width:15px;height:15px;"></div>
          <div class="sz-btn" data-sz="20" style="width:21px;height:21px;"></div>
          <div class="sz-btn" data-sz="32" style="width:27px;height:27px;"></div>
        </div>
        <div class="tsep"></div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
          <button class="t-btn act" id="tb-draw">✏️ Draw</button>
          <button class="t-btn" id="tb-eraser">⬜ Erase</button>
          <button class="t-btn" id="tb-fill">🪣 Fill</button>
          <button class="t-btn clr" id="tb-clear">🗑 Clear</button>
          <button class="t-btn" id="tb-undo">↩ Undo</button>
        </div>
      </div>
      <div class="info-strip">
        <div class="info-label" id="info-label">Waiting for game to start...</div>
        <div class="reveal-track"><div class="reveal-fill" id="reveal-fill"></div></div>
      </div>
      <div class="hint-bar" id="hint-bar"></div>
      <canvas id="canvas"></canvas>
    </div>

    <!-- Chat -->
    <div class="chat">
      <div class="chat-head">💬 Guesses</div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input">
        <input id="chat-in" type="text" placeholder="Type guess..." maxlength="60" inputmode="text"/>
        <button class="chat-send" id="chat-btn">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- ── OVERLAY ───────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="ov-card" id="ov-card"></div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const WS_URL =
  location.protocol === "https:"
    ? `wss://${location.host}`
    : `ws://${location.host}`;
const AVATARS = ['🐶','🐱','🦊','🐼','🐨','🦁','🐸','🐙','🦋','🦄','🐲','🐯'];
const COLORS  = ['#000000','#ffffff','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f59e0b','#6b7280','#92400e'];

// ── State ───────────────────────────────────────────────────────────────────
let ws, playerId, roomCode, isHost=false;
let drawerId=null, myAvatar=AVATARS[0];
let color='#000000', brushSz=4, tool='draw', isDown=false, lx=0, ly=0;
let undoStack=[], snapshotId=0;
let players=[], totalRounds=3, drawTime=80;

// ── Canvas ───────────────────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
//let canvasInitialized = false;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const width = rect.width;
  const height = rect.height;

  if (width === 0 || height === 0) return;

  let prev = null;
  if (canvas.width > 0 && canvas.height > 0) {
    try {
      prev = ctx.getImageData(0, 0, canvas.width, canvas.height);
    } catch {}
  }

  canvas.width = width;
  canvas.height = height;

  ctx.putImageData(prev, 0, 0);

  console.log("Canvas resized:", width, height);
}
window.addEventListener('resize',resizeCanvas);

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
}

function isDrawer(){return playerId===drawerId;}

function saveUndo(){
  if (canvas.width === 0 || canvas.height === 0) return;

  try {
   undoStack.push({
      data: ctx.getImageData(0,0,canvas.width,canvas.height),
      sid: Date.now()
    });
  } catch (e) {
    console.log("Undo skipped:", e);
  }
}
console.log("Canvas size:", canvas.width, canvas.height);
canvas.addEventListener('mousedown',e=>{if(!isDrawer())return;onDown(getPos(e));});
canvas.addEventListener('mousemove',e=>{if(!isDrawer()||!isDown)return;onMove(getPos(e));});
canvas.addEventListener('mouseup',()=>{isDown=false;});
canvas.addEventListener('mouseleave',()=>{isDown=false;});
canvas.addEventListener('touchstart',e=>{if(!isDrawer())return;e.preventDefault();onDown(getPos(e));},{passive:false});
canvas.addEventListener('touchmove',e=>{if(!isDrawer()||!isDown)return;e.preventDefault();onMove(getPos(e));},{passive:false});
canvas.addEventListener('touchend',()=>{isDown=false;});

function onDown(p){
  isDown = true;
  lx = p.x;
  ly = p.y;

  if(tool === 'fill'){
    saveUndo();

   floodFill(
  Math.round(p.x),
  Math.round(p.y),
  color
);

    sendDraw({
      type: 'fill',
      x: p.x / canvas.width,
      y: p.y / canvas.height,
      color: color
    });

    isDown = false;
    return;
  }

  saveUndo();

  ctx.beginPath();
  ctx.arc(p.x, p.y, brushSz/2, 0, Math.PI*2);
  ctx.fillStyle = tool === 'eraser' ? '#fff' : color;
  ctx.fill();

  sendDraw({
    type: 'dot',
    x: p.x / canvas.width,
    y: p.y / canvas.height,
    sz: brushSz,
    color: tool === 'eraser' ? '#fff' : color
  });
}

function onMove(p){
  if(!isDown) return;

  const data = {
    type: 'stroke',
    x0: lx / canvas.width,
    y0: ly / canvas.height,
    x1: p.x / canvas.width,
    y1: p.y / canvas.height,
    color: color,
    size: brushSz
  };

  // ✅ DRAW LOCALLY (THIS IS THE MISSING PART)
  renderDraw(data);

  // send to others
  sendDraw(data);

  lx = p.x;
  ly = p.y;
}
 

function renderDraw(d){
  ctx.strokeStyle = d.color;
  ctx.lineWidth = d.size;
  ctx.lineCap = 'round';

  if(d.type === 'stroke'){
    ctx.beginPath();
    ctx.moveTo(d.x0 * canvas.width, d.y0 * canvas.height);
    ctx.lineTo(d.x1 * canvas.width, d.y1 * canvas.height);
    ctx.strokeStyle = d.color;
    ctx.lineWidth = d.size;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  else if(d.type === 'dot'){
    ctx.beginPath();
    ctx.arc(d.x * canvas.width, d.y * canvas.height, d.sz/2, 0, Math.PI*2);
    ctx.fillStyle = d.color;
    ctx.fill();
  }

  else if(d.type === 'fill'){
    floodFill(
      Math.round(d.x * canvas.width),
      Math.round(d.y * canvas.height),
      d.color
    );
  }
}
function showGameScreen(){
  initToolbar();
  showScreen('game-screen');
  updateSidebar();

  setTimeout(() => {
    resizeCanvas();
  }, 100); // ensure layout ready
}
function floodFill(x,y,hex){
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=img.data;
  const i=(y*canvas.width+x)*4;
  const tr=d[i],tg=d[i+1],tb=d[i+2],ta=d[i+3];
  const fc=hexRgb(hex);
  if(tr===fc.r&&tg===fc.g&&tb===fc.b)return;
  const stack=[[x,y]],vis=new Uint8Array(canvas.width*canvas.height);
  while(stack.length){
    const[cx,cy]=stack.pop();
    if(cx<0||cx>=canvas.width||cy<0||cy>=canvas.height)continue;
    const ci=(cy*canvas.width+cx)*4;
    if(vis[cy*canvas.width+cx])continue;
    if(d[ci]!==tr||d[ci+1]!==tg||d[ci+2]!==tb||d[ci+3]!==ta)continue;
    vis[cy*canvas.width+cx]=1;
    d[ci]=fc.r;d[ci+1]=fc.g;d[ci+2]=fc.b;d[ci+3]=255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(img,0,0);
}

function hexRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

function sendDraw(payload){
  wsSend(payload.type,payload);
}

function clearCanvasLocal(){
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  undoStack=[];
}

function doUndo(){
  if(!undoStack.length)return;
  const{sid,data}=undoStack.pop();
  ctx.putImageData(data,0,0);
  wsSend('undo',{snapshotId:sid});
}

// ── Toolbar ──────────────────────────────────────────────────────────────────
function initToolbar(){
  const row=document.getElementById('color-row');
  row.innerHTML='';
  COLORS.forEach(c=>{
    const s=document.createElement('div');
    s.className='color-sw'+(c===color?' act':'');
    s.style.background=c;
    if(c==='#ffffff')s.style.border='2px solid #aaa';
    s.onclick=()=>{
      document.querySelectorAll('.color-sw').forEach(x=>x.classList.remove('act'));
      s.classList.add('act'); color=c; setTool('draw');
    };
    row.appendChild(s);
  });
  document.querySelectorAll('.sz-btn').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.sz-btn').forEach(x=>x.classList.remove('act'));
      b.classList.add('act'); brushSz=+b.dataset.sz;
    };
  });
  document.getElementById('tb-draw').onclick=()=>setTool('draw');
  document.getElementById('tb-eraser').onclick=()=>setTool('eraser');
  document.getElementById('tb-fill').onclick=()=>setTool('fill');
  document.getElementById('tb-clear').onclick=()=>{clearCanvasLocal();wsSend('clear_canvas');};
  document.getElementById('tb-undo').onclick=doUndo;
}

function setTool(t){
  tool=t;
  ['draw','eraser','fill'].forEach(x=>document.getElementById('tb-'+x).classList.toggle('act',x===t));
  canvas.className=t==='eraser'?'eraser':t==='fill'?'fill-c':'';
  if(!isDrawer())canvas.className='viewer';
}

function setDrawerMode(drawing){
  const tb=document.getElementById('toolbar');
  tb.style.pointerEvents=drawing?'auto':'none';
  tb.style.opacity=drawing?'1':'.45';
  canvas.style.pointerEvents=drawing?'auto':'none';
  canvas.className=drawing?(tool==='eraser'?'eraser':tool==='fill'?'fill-c':''):'viewer';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS(){
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log("WS Connected");
  };

  ws.onmessage = (e) => {
    console.log("raw msg ",e.data);
    const msg = JSON.parse(e.data);
    console.log("Received:", msg);
    handleMsg(msg);
  };
}
function wsSend(type,payload={}){
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type,...payload}));
}

// ── Message Handler ───────────────────────────────────────────────────────────
function handleMsg(msg){
  switch(msg.type){

    case'room_created':
    case'room_joined':
      playerId=msg.playerId; roomCode=msg.roomCode;
      isHost=msg.isHost; totalRounds=msg.totalRounds; drawTime=msg.drawTime;
      players=msg.players;
      showLobby();
      break;

    case'player_joined':
      players=msg.players;
      updateLobbyPlayers();
      break;

    case'player_left':
      players=msg.players;
      if(document.getElementById('lobby-screen').classList.contains('active'))updateLobbyPlayers();
      else updateSidebar();
      break;

    case'settings_updated':
      totalRounds=msg.totalRounds; drawTime=msg.drawTime;
      break;

    case'game_starting':
      players=msg.players; totalRounds=msg.totalRounds; drawTime=msg.drawTime;
      showGameScreen();
      break;

    case'turn_start':
      drawerId=msg.drawerId;
      document.getElementById('round-label').textContent=`Round ${msg.round}/${msg.totalRounds}`;
      document.getElementById('word-display').textContent='· · ·';
      document.getElementById('hint-bar').style.display='none';
      document.getElementById('reveal-fill').style.width='0%';
      document.getElementById('timer').textContent=drawTime;
      document.getElementById('timer').classList.remove('urgent');
      //canvasInitialized = false;
      resizeCanvas();
      updateSidebar();
      hideOverlay();
      clearCanvasLocal();
      setDrawerMode(false);
      break;

    case'choose_word':
      showWordChoiceOverlay(msg.words);
      break;

    case'waiting_for_word':
      document.getElementById('info-label').textContent=`${msg.drawerName} is choosing a word...`;
      break;

    case'drawing_start':{
      const iAm=isDrawer();
      setDrawerMode(iAm);
      document.getElementById('info-label').textContent=iAm?`You are drawing!`:`Guess what's being drawn!`;
      document.getElementById('timer').textContent=msg.timeLeft;
      document.getElementById('word-display').textContent=iAm?'(you know the word)':msg.masked;
      hideOverlay();
      break;
    }

    case'word_update':
      if(!isDrawer())document.getElementById('word-display').textContent=msg.masked;
      break;

    case'timer':{
      document.getElementById('timer').textContent=msg.timeLeft;
      document.getElementById('timer').classList.toggle('urgent',msg.timeLeft<=10);
      const pct=((drawTime-msg.timeLeft)/drawTime)*100;
      document.getElementById('reveal-fill').style.width=pct+'%';
      break;
    }

    case'hint':
      document.getElementById('hint-bar').textContent='💡 Hint: '+msg.hint;
      document.getElementById('hint-bar').style.display='block';
      break;

    case'player_guessed':
      players=msg.players;
      updateSidebar();
      addChat(null,`✅ ${msg.playerName} guessed it! +${msg.points} pts`,'correct');
      break;

    case'chat_msg':
      addChat(msg.playerName,msg.message,msg.cls||'chat');
      break;

    case 'dot':
    case 'fill':
    case 'stroke':
      console.log("DRAW EVENT :",msg)
      renderDraw(msg);
      break;

    case'clear_canvas':
      clearCanvasLocal();
      break;

    case'undo':{
      if(!isDrawer()){
        let f = -1;
        for (let i = undoStack.length - 1; i >= 0; i--) {
          if (undoStack[i].sid === msg.snapshotId) {
            f = i;
            break;
          }
        }
        if(f>=0){ctx.putImageData(undoStack[f].data,0,0);undoStack=undoStack.slice(0,f);}
        else{ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);}
      }
      break;
    }

    case'turn_end':
      players=msg.players;
      updateSidebar();
      document.getElementById('word-display').textContent='';
      addChat(null,`The word was: "${msg.word}"!`,'system');
      document.getElementById('hint-bar').style.display='none';
      setDrawerMode(false);
      break;

    case'game_over':
      showGameOver(msg.leaderboard);
      break;

    case'error':
      showError(msg.message);
      break;
  }
}

// ── UI: Screens ───────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('game-screen').style.display='none';
  if(id==='game-screen'){
    document.getElementById('game-screen').style.display='flex';
    setTimeout(()=>{resizeCanvas();},50);
  }else{
    document.getElementById(id).classList.add('active');
  }
}

function showLobby(){
  showScreen('lobby-screen');
  document.getElementById('lobby-code').textContent=roomCode;
  document.getElementById('lobby-url').textContent=location.host;
  updateLobbyPlayers();

  const ha=document.getElementById('host-settings');
  const la=document.getElementById('lobby-actions');
  if(isHost){
    ha.style.display='flex';
    la.innerHTML='<button class="btn btn-primary" id="btn-start">Start Game 🎮</button>';
    document.getElementById('btn-start').onclick=()=>{
      if(players.length<2){showError('Need at least 2 players to start!');return;}
      wsSend('start_game');
    };
    document.getElementById('s-rounds').addEventListener('change',e=>{
      wsSend('update_settings',{rounds:+e.target.value});
    });
    document.getElementById('s-time').addEventListener('change',e=>{
      wsSend('update_settings',{drawTime:+e.target.value});
    });
  }else{
    ha.style.display='none';
    la.innerHTML='<div class="waiting-msg" id="lobby-status">Waiting for host to start the game...</div>';
  }
}

function updateLobbyPlayers(){
  const box=document.getElementById('lobby-players');
  box.innerHTML='';
  players.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='lobby-player';
    d.innerHTML=`<span style="font-size:1.4rem">${p.avatar}</span>
      <span class="lobby-player-name">${p.name}${i===0?'<span class="host-badge">HOST</span>':''}</span>`;
    box.appendChild(d);
  });
  document.getElementById('player-count').textContent=players.length;
}

function updateSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='<div class="sidebar-title">Players</div>';
  players.forEach(p=>{
    const isD=p.id===drawerId;
    let guessed = false;
      const el = document.querySelector(`[data-guessed="${p.id}"]`);
      if (el && el.dataset.guessed === 'true') {
        guessed = true;
      }
    const d=document.createElement('div');
    d.className='p-card'+(isD?' is-drawer':'');
    d.dataset.pid=p.id;
    d.innerHTML=`
      ${isD?'<div class="badge badge-draw">✏️</div>':''}
      <div class="p-avi">${p.avatar}</div>
      <div class="p-info">
        <div class="p-name">${p.name}</div>
        <div class="p-score">${p.score} pts</div>
      </div>`;
    sb.appendChild(d);
  });
}

function addChat(name, msg, cls='chat'){
  const box=document.getElementById('chat-msgs');
  const d=document.createElement('div');
  d.className='msg '+cls;
  if(name)d.innerHTML=`<span class="mn">${name}:</span> ${escHtml(msg)}`;
  else d.textContent=msg;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Overlays ─────────────────────────────────────────────────────────────────
function showWordChoiceOverlay(words){
  document.getElementById('ov-card').innerHTML=`
    <h2 style="margin-bottom:.4rem;">Choose a Word ✏️</h2>
    <p>You are drawing this round — pick one:</p>
    <div class="word-choices">
      ${words.map(w=>`<div class="wc" onclick="pickWord('${w}')">${w}</div>`).join('')}
    </div>`;
  document.getElementById('overlay').classList.add('show');
}
window.pickWord=w=>{wsSend('word_chosen',{word:w});hideOverlay();};

function showGameOver(lb){
  const ranks=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣'];
  const rows=lb.map((p,i)=>`
    <div class="lb-row">
      <div class="lb-rank">${ranks[i]||''}</div>
      <div class="lb-avi">${p.avatar}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-pts">${p.score} pts</div>
    </div>`).join('');
  document.getElementById('ov-card').innerHTML=`
    <h2 style="margin-bottom:.25rem;">🎉 Game Over!</h2>
    <p>${lb[0].name} wins with ${lb[0].score} points!</p>
    <div class="lb">${rows}</div>
    <button class="btn btn-primary" onclick="location.reload()">Play Again</button>`;
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay(){document.getElementById('overlay').classList.remove('show');}

function showError(msg){
  const e=document.getElementById('h-err');
  if(e){e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
  else alert(msg);
}

// ── Avatar picker ─────────────────────────────────────────────────────────────
function initAvatars(){
  const row=document.getElementById('avi-row');
  AVATARS.forEach((a,i)=>{
    const b=document.createElement('div');
    b.className='avi-btn'+(i===0?' sel':'');
    b.textContent=a;
    b.onclick=()=>{
      document.querySelectorAll('.avi-btn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel'); myAvatar=a;
    };
    row.appendChild(b);
  });
}

// ── Home buttons ──────────────────────────────────────────────────────────────
document.getElementById('btn-create').onclick=()=>{
  const name=document.getElementById('h-name').value.trim();
  if(!name){showError('Please enter your name!');return;}

  wsSend('create_room',{name,avatar:myAvatar});
};

document.getElementById('btn-show-join').onclick=()=>{
  const s=document.getElementById('join-section');
  s.style.display=s.style.display==='flex'?'none':'flex';
};

document.getElementById('btn-join').onclick=()=>{
  const name=document.getElementById('h-name').value.trim();
  const code=document.getElementById('h-code').value.trim().toUpperCase();

  if(!name){showError('Please enter your name!');return;}
  if(code.length!==4){showError('Enter a valid 4-letter room code');return;}

  wsSend('join_room',{name,avatar:myAvatar,roomCode:code});
};

document.getElementById('h-code').addEventListener('input',e=>{
  e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
});

// ── Chat ──────────────────────────────────────────────────────────────────────
document.getElementById('chat-btn').onclick=sendChat;
document.getElementById('chat-in').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});

function sendChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  inp.blur(); 
  wsSend('chat',{message:msg});
}

// ── Init ──────────────────────────────────────────────────────────────────────
initAvatars();
connectWS();

window.addEventListener('load', () => {
  resizeCanvas();
});
</script>
